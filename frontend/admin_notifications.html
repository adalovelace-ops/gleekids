<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Notifications</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-50">
  <div class="flex min-h-screen">
    
    <main class="flex-1 p-8">
      <div class="max-w-4xl mx-auto">
        <div class="flex items-center justify-between mb-6">
          <div>
            <p class="text-sm text-gray-600">System</p>
            <h1 class="text-2xl font-semibold text-gray-900">Notifications</h1>
            <p class="text-gray-600 text-sm">{{ unread }} unread</p>
          </div>
          <div class="flex items-center gap-3">
            <a href="?mark_all=1" class="text-sm text-amber-700 hover:underline">Mark all read</a>
            <a href="/admin-dashboard/" class="text-sm text-amber-700 hover:underline">← Back to dashboard</a>
          </div>
        </div>

        {% if list %}
          <div class="p-4 bg-white border border-gray-200 rounded-lg">No notifications yet.</div>
        {% else %}
          <div class="space-y-3">
            
              <div class="p-4 bg-white border border-gray-200 rounded-lg flex items-start justify-between">
                <div>
                  <div class="text-sm font-semibold text-gray-900 flex items-center gap-2">
                    <span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs {{ n }}">{{ n }}</span>
                    <span>{{ n }}</span>
                  </div>
                  <div class="text-xs text-gray-600 mt-1">{{ n }}</div>
                  {% if n %}
                    <a class="text-xs text-amber-700 hover:underline" href="{{ n }}">Open</a>
                  {% endif %}
                </div>
                <div class="text-xs text-gray-500 flex flex-col items-end gap-1">
                  {% if n %}
                    <a class="text-amber-700 hover:underline" href="?mark={{ n }}">Mark read</a>
                  {% else %}
                    <span class="text-gray-400">Read</span>
                  {% endif %}
                </div>
              </div>
            
          </div>
        {% endif %}
      </div>
    </main>
  </div>
</body>
</html>

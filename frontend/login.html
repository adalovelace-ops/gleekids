<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: linear-gradient(135deg, #fffbe6 0%, #ffe082 100%);
    }
    .login-card {
      background: #fffbe6;
      border: 1px solid #ffe082;
      box-shadow: 0 8px 32px rgba(255, 193, 34, 0.12);
    }
    .login-btn {
      background: #FFC122;
      color: #fff;
      border: none;
      transition: background 0.2s;
    }
    .login-btn:hover, .login-btn:focus {
      background: #e6a700;
      color: #fff;
    }
    .login-divider {
      color: #b45309;
    }
    .login-link {
      color: #b45309;
    }
    .login-link:hover {
      color: #FFC122;
    }
    .login-input:focus {
      border-color: #FFC122;
      box-shadow: 0 0 0 2px #ffe082;
    }
  </style>
  <link rel="stylesheet" href="/static/css/system_palette.css">
</head>
<body class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
  <div class="max-w-md w-full space-y-8">
    <div>
      <img class="mx-auto h-32 w-auto" src="/media/gleelogo.png" alt="Gleekids Logo">
      <h2 class="mt-6 text-center text-3xl font-extrabold text-yellow-700">Admin Login</h2>
      <p class="mt-2 text-center text-sm font-semibold text-yellow-900">For Gleekids recruitment staff only.</p>
    </div>
    <form class="mt-8 space-y-6 login-card p-8 rounded-lg" action="" method="POST" novalidate>
      {% csrf_token %}
      
      {% if error %}
        <div class="text-sm text-red-700 bg-red-100 border border-red-200 p-3 rounded">{{ error }}</div>
      {% endif %}
      {% if oauth_error %}
        <div class="text-sm text-red-700 bg-red-100 border border-red-200 p-3 rounded">{{ oauth_error }}</div>
      {% endif %}
      <div class="rounded-md shadow-sm -space-y-px">
        <div>
          <label for="email" class="sr-only">Email address</label>
          <input id="email" name="email" type="email" autocomplete="email" required
            class="login-input appearance-none rounded-none relative block w-full px-3 py-2 border border-yellow-200 placeholder-yellow-600 text-gray-900 rounded-t-md focus:outline-none focus:ring-yellow-400 focus:border-yellow-400 focus:z-10 sm:text-sm"
            placeholder="Email address" value="{{ email }}">
        </div>
        <div class="pt-4">
          <label for="password" class="sr-only">Password</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required
            class="login-input appearance-none rounded-none relative block w-full px-3 py-2 border border-yellow-200 placeholder-yellow-600 text-gray-900 rounded-b-md focus:outline-none focus:ring-yellow-400 focus:border-yellow-400 focus:z-10 sm:text-sm"
            placeholder="Password">
        </div>
      </div>

      <div class="flex items-center justify-between">
        <div class="flex items-center">
          <input id="remember_me" name="remember_me" type="checkbox"
            class="h-4 w-4 text-yellow-500 focus:ring-yellow-400 border-yellow-300 rounded">
          <label for="remember_me" class="ml-2 block text-sm text-yellow-900">Remember me</label>
        </div>

        <div class="text-sm">
          <a href="#" class="login-link font-medium">Forgot your password?</a>
        </div>
      </div>

      <div>
        <button type="submit"
          class="login-btn group relative w-full flex justify-center py-2 px-4 text-sm font-medium rounded-md">
          Sign in to Admin Dashboard
        </button>
      </div>

      <div class="relative flex items-center justify-center">
        <span class="h-px bg-yellow-200 w-full"></span>
        <span class="px-2 text-xs login-divider">OR</span>
        <span class="h-px bg-yellow-200 w-full"></span>
      </div>

      <div>
        <a href="/google_redirect" class="w-full inline-flex items-center justify-center gap-2 py-2 px-4 border border-yellow-300 text-sm font-medium rounded-md text-yellow-900 bg-yellow-100 hover:bg-yellow-200 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-yellow-400">
          <span aria-hidden="true">🔐</span>
          <span>Admin sign in with Google</span>
        </a>
      </div>
    </form>
    <div class="text-center text-sm text-yellow-900">
      <a href="/login/" class="login-link hover:underline">Applicant login is here</a>
    </div>
  </div>
</body>
</html>

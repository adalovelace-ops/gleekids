<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Applicant Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: linear-gradient(135deg, #fffbe6 0%, #ffe082 100%);
    }
    .login-card {
      background: #fffbe6;
      border: 1px solid #ffe082;
      box-shadow: 0 8px 32px rgba(255, 193, 34, 0.12);
    }
    .login-btn {
      background: #FFC122;
      color: #fff;
      border: none;
      transition: background 0.2s;
    }
    .login-btn:hover, .login-btn:focus {
      background: #e6a700;
      color: #fff;
    }
    .login-link {
      color: #b45309;
    }
    .login-link:hover {
      color: #FFC122;
    }
    .login-input:focus {
      border-color: #FFC122;
      box-shadow: 0 0 0 2px #ffe082;
    }
  </style>
  <link rel="stylesheet" href="/static/css/system_palette.css">
</head>
<body class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
  <div class="max-w-md w-full space-y-8">
    <div>
      <img class="mx-auto h-32 w-auto" src="/media/gleelogo.png" alt="Gleekids Logo">
      <h2 class="mt-6 text-center text-2xl font-bold text-yellow-700">Applicant Login</h2>
      <p class="mt-2 text-center text-sm text-yellow-900">Enter the email you used to apply and the password you created on the application form.</p>
    </div>
    <form class="mt-8 space-y-6 login-card p-8 rounded-lg" action="" method="POST" novalidate>
      {% csrf_token %}
      
      {% if error %}
        <div class="text-sm text-red-700 bg-red-100 border border-red-200 p-3 rounded">{{ error }}</div>
      {% endif %}
      <div class="rounded-md shadow-sm -space-y-px">
        <div>
          <label for="email" class="sr-only">Email address</label>
          <input id="email" name="email" type="email" autocomplete="email" required
            class="login-input appearance-none rounded-none relative block w-full px-3 py-2 border border-yellow-200 placeholder-yellow-600 text-gray-900 rounded-t-md focus:outline-none focus:ring-yellow-400 focus:border-yellow-400 sm:text-sm"
            placeholder="Email address" value="{{ email }}">
        </div>
        <div class="pt-4">
          <label for="password" class="sr-only">Password</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required
            class="login-input appearance-none rounded-none relative block w-full px-3 py-2 border border-yellow-200 placeholder-yellow-600 text-gray-900 rounded-b-md focus:outline-none focus:ring-yellow-400 focus:border-yellow-400 sm:text-sm"
            placeholder="Password">
        </div>
      </div>

      <div>
        <button type="submit"
          class="login-btn group relative w-full flex justify-center py-2 px-4 text-sm font-medium rounded-md">
          Sign in to Applicant Portal
        </button>
      </div>
    </form>
    <div class="text-center text-sm text-yellow-900">
      <a href="/" class="login-link hover:underline">Back to homepage</a>
      <span class="mx-2">|</span>
      <a href="/admin-login/" class="login-link hover:underline">Admin login</a>
    </div>
  </div>
</body>
</html>
